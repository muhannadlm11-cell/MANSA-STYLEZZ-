<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANSA STYLEZ | Place an Order</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; text-align: center; padding: 40px 20px; }
    h1 { color: #FFD700; margin-bottom: 10px; font-weight: 700; letter-spacing: 2px;}
    p.subtitle { font-size: 1.1em; color: #ccc; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; }
    
    /* Form Styling */
    .order-form {
        background-color: #0a0a0a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 30px 20px;
        max-width: 600px;
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        text-align: left;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #FFD700;
        font-size: 0.9em;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    input, select, textarea {
        width: 100%;
        padding: 15px;
        background-color: #111;
        border: 1px solid #444;
        border-radius: 6px;
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        font-size: 1em;
        box-sizing: border-box;
        transition: border-color 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #FFD700;
    }

    textarea {
        resize: vertical;
        height: 120px;
    }

    /* Submit Button */
    .submit-btn {
        width: 100%;
        background-color: #FFD700;
        color: #000;
        border: none;
        padding: 18px;
        font-size: 1.2em;
        font-weight: 700;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 10px;
    }

    .submit-btn:hover {
        background-color: #e6c200;
        transform: translateY(-2px);
    }

    .back-btn {
        background-color: transparent;
        color: #888;
        border: none;
        padding: 15px;
        font-size: 1em;
        cursor: pointer;
        margin-top: 20px;
        text-decoration: underline;
    }
</style>
</head>
<body>

    <h1>Place Your Order</h1>
    <p class="subtitle">Fill out the details below. Our team will review your measurements and contact you immediately to finalize the fabric and payment.</p>

    <div class="order-form">
        <form action="https://formspree.io/f/mjgaakon" method="POST">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="Client Name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Phone Number (WhatsApp)</label>
                <input type="tel" name="Phone Number" required placeholder="e.g., 08123456789">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="Email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Outfit Style</label>
                <select name="Style Requested" required>
                    <option value="" disabled selected>Select a style...</option>
                    <option value="Kaftan">Premium Kaftan</option>
                    <option value="Senator">Senator Suit</option>
                    <option value="Jallabiya">Jallabiya</option>
                    <option value="Two-Piece Suit">Two-Piece Suit</option>
                    <option value="Other">Other / Custom</option>
                </select>
            </div>

            <div class="form-group">
                <label>Measurements & Details</label>
                <textarea name="Measurements" required placeholder="Please provide your sizes (chest, length, trouser length, etc.) or any specific design requests."></textarea>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <textarea name="Delivery Address" required placeholder="Full street address for delivery"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Order</button>
        </form>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">Cancel & Return Home</button>

</body>
  </html>
