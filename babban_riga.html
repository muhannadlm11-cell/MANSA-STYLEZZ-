<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANSA STYLEZ | Babban Riga</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; text-align: center; padding: 50px 20px; }
    h1 { color: #FFD700; margin-bottom: 10px; font-weight: 700; letter-spacing: 2px;}
    p.subtitle { font-size: 1.1em; color: #ccc; max-width: 600px; margin: 0 auto 40px auto; line-height: 1.6; }
    .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
    .price-card { background-color: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.3s; }
    .price-card:hover { transform: translateY(-5px); border-color: #FFD700; box-shadow: 0 10px 25px rgba(255, 215, 0, 0.15); }
    .price-card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 2px solid #333; }
    .price-info { padding: 20px; text-align: left; }
    .price-info h3 { margin: 0 0 10px 0; color: #FFD700; font-size: 1.4em; text-transform: uppercase; }
    .price-info .price { font-size: 1.3em; font-weight: 700; color: #fff; margin: 0 0 10px 0; }
    .order-btn { background-color: #FFD700; color: #000; width: 100%; margin-top: 15px; padding: 12px; border: none; font-size: 1em; font-weight: 700; border-radius: 5px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
    .order-btn:hover { background-color: #e6c200; }
    .back-btn { background-color: transparent; color: #FFD700; border: 2px solid #FFD700; padding: 15px 35px; font-size: 1.1em; font-weight: 600; border-radius: 5px; cursor: pointer; margin-top: 50px; transition: 0.3s; }
    .back-btn:hover { background-color: #FFD700; color: #000; }
</style>
</head>
<body>
    <h1>Babban Riga</h1>
    <p class="subtitle">The ultimate symbol of prestige and royalty. Handcrafted embroidery designed to make a statement.</p>

    <div class="price-grid">
        <div class="price-card">
            <img src="images/design4.jpg" alt="Royal Babban Riga">
            <div class="price-info">
                <h3>Royal Full Embroidery</h3>
                <p class="price">₦85,000</p>
                <button class="order-btn" onclick="window.location.href='order.html'">Order This</button>
            </div>
        </div>
        <div class="price-card">
            <img src="images/design6.jpg" alt="Modern Babban Riga">
            <div class="price-info">
                <h3>Modern Minimalist</h3>
                <p class="price">₦60,000</p>
                <button class="order-btn" onclick="window.location.href='order.html'">Order This</button>
            </div>
        </div>
        <div class="price-card">
            <img src="images/design1.jpg" alt="Three-Piece Babban Riga">
            <div class="price-info">
                <h3>Classic Three-Piece</h3>
                <p class="price">₦75,000</p>
                <button class="order-btn" onclick="window.location.href='order.html'">Order This</button>
            </div>
        </div>
        <div class="price-card">
            <img src="images/design3.jpg" alt="Two-Tone Babban Riga">
            <div class="price-info">
                <h3>Two-Tone Masterpiece</h3>
                <p class="price">₦90,000</p>
                <button class="order-btn" onclick="window.location.href='order.html'">Order This</button>
            </div>
        </div>
        <div class="price-card">
            <img src="images/design5.jpg" alt="Heavy Damask Babban Riga">
            <div class="price-info">
                <h3>Heavy Damask Fabric</h3>
                <p class="price">₦110,000</p>
                <button class="order-btn" onclick="window.location.href='order.html'">Order This</button>
            </div>
        </div>
    </div>
    <button class="back-btn" onclick="window.location.href='page3.html'">Back to Collections</button>
</body>
</html>
