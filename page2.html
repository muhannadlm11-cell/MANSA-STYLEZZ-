<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHB CLOTHING | Premium Textiles</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; text-align: center; padding: 50px 20px; }
    h1 { color: #FFD700; margin-bottom: 10px; font-weight: 700; letter-spacing: 2px;}
    p.subtitle { font-size: 1.1em; color: #ccc; max-width: 600px; margin: 0 auto 40px auto; line-height: 1.6; }
    
    /* Category Grid Layout */
    .category-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        max-width: 1000px;
        margin: 0 auto;
    }

    /* Category Cards */
    .category-card {
        background-color: #0a0a0a;
        border: 2px solid #333;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .category-card:hover {
        transform: translateY(-5px);
        border-color: #FFD700;
        box-shadow: 0 10px 25px rgba(255, 215, 0, 0.2);
    }

    .category-card img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-bottom: 2px solid #333;
        transition: opacity 0.3s;
    }

    .category-card:hover img { opacity: 0.8; }

    .category-card h3 {
        margin: 0;
        padding: 20px;
        color: #FFD700;
        font-size: 1.5em;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .back-btn { background-color: transparent; color: #FFD700; border: 2px solid #FFD700; padding: 15px 35px; font-size: 1.1em; font-weight: 600; border-radius: 5px; cursor: pointer; margin-top: 50px; transition: 0.3s; }
    .back-btn:hover { background-color: #FFD700; color: #000; }
</style>
</head>
<body>

    <h1>Premium Textiles</h1>
    <p class="subtitle">Explore our exclusive range of fabrics. Click a category to view colors and pricing.</p>

    <div class="category-grid">
        
        <div class="category-card" onclick="window.location.href='atiku.html'">
            <img src="images/atiku.jpg" alt="Swiss Atiku">
            <h3>Swiss Atiku</h3>
        </div>

        <div class="category-card" onclick="window.location.href='wool.html'">
            <img src="images/wool.jpg" alt="Italian Wool">
            <h3>Italian Wool</h3>
        </div>

        <div class="category-card" onclick="window.location.href='cashmere.html'">
            <img src="images/cashmere.jpg" alt="Pure Cashmere">
            <h3>Pure Cashmere</h3>
        </div>

        <div class="category-card" onclick="window.location.href='senator_fabric.html'">
            <img src="images/senator_fabric.jpg" alt="Senator Material">
            <h3>Senator Material</h3>
        </div>

    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">Go Back Home</button>

</body>
</html>
